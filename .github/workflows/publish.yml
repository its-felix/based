name: "Publish"

on:
  push:
    tags:
      - "v[0-9]+\\.[0-9]+\\.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go test ./...
      - run: GOPROXY=proxy.golang.org go list -m github.com/its-felix/based@${{ github.ref_name }}
